# wezterm-bg.conf - Color settings for wezterm-bg.sh
#
# Copy this file alongside wezterm-bg.sh and edit as needed:
#   cp shell/wezterm-bg.conf ~/.claude/hooks/

# Background color when agent finishes (Stop hook)
COLOR_DONE="#0d2b0d"

# Background color when waiting for input (Notification hook)
# Leave empty to keep the default background color
COLOR_WAITING=""
